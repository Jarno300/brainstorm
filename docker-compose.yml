services:
  # =====================
  # PostgreSQL Database
  # =====================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U raguser -d ragdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brainstorm-net

  # =====================
  # Redis (Celery Broker)
  # =====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - brainstorm-net

  # =====================
  # Ollama Model Server (opt-in via --profile ollama)
  #
  # Only needed when DEFAULT_MODEL uses an ollama/... model.
  # For DeepSeek/OpenAI/Anthropic, skip this service entirely.
  #
  # Start with:  docker compose --profile ollama up
  # =====================
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    environment:
      DEFAULT_MODEL: ${DEFAULT_MODEL:-ollama/llama3.2:1b}
      OLLAMA_HOST: 0.0.0.0:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        model="$${DEFAULT_MODEL}"
        model_name="$${model#ollama/}"

        ollama serve &
        server_pid="$!"

        cleanup() {
          kill "$$server_pid" >/dev/null 2>&1 || true
          wait "$$server_pid" >/dev/null 2>&1 || true
        }

        trap cleanup INT TERM

        until ollama list >/dev/null 2>&1; do
          sleep 2
        done

        case "$(ollama list 2>/dev/null)" in
          *"$$model_name"*)
            ;;
          *)
            ollama pull "$$model_name"
            ;;
        esac

        wait "$$server_pid"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test:
        - CMD-SHELL
        - case "$(ollama list 2>/dev/null)" in *"$${DEFAULT_MODEL#ollama/}"*) exit 0 ;; *) exit 1 ;; esac
      interval: 5s
      timeout: 10s
      retries: 30
    networks:
      - brainstorm-net

  # =====================
  # FastAPI Backend
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      APP_ENV: ${APP_ENV:-development}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://frontend:5173}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health/ready'); r.raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brainstorm-net

  # =====================
  # Celery Worker
  # =====================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "celery -A app.tasks.celery_app worker --loglevel=info --pool=$${CELERY_POOL:-prefork} --concurrency=$${CELERY_CONCURRENCY:-4}"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://raguser:ragpassword@postgres:5432/ragdb
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_POOL: ${CELERY_POOL:-prefork}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-180}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      APP_ENV: ${APP_ENV:-development}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brainstorm-net

  # =====================
  # Frontend (Vite Dev Server)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - brainstorm-net

volumes:
  postgres-data:
  redis-data:
  ollama-data:

networks:
  brainstorm-net:
    driver: bridge
