[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library to be available.
# timezone =

# max length of characters to apply to the "slug" field after the
# revision hash; defaults to 40
# truncate_slug_length =

# set to 'true' to run the environment during the "revision" command
prepend_sys_path = .

# version location specification; this defaults to alembic/versions.
# version_locations = %(here)s/bar %(here)s/bat alembic/versions

# the output encoding used when revision files are written.
# output_encoding = utf-8

sqlalchemy.url = placeholder  # set in env.py from app config

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# lint with black on generate
# hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
