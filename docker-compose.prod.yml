# Production Docker Compose — single-host deployment with nginx reverse proxy.
#
# Usage:
#   1. Copy .env.example to .env.production and set real values
#   2. Create SSL certs or use Let's Encrypt (see nginx/init-letsencrypt.sh)
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # =====================
  # PostgreSQL (production config)
  # =====================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - brainstorm-net

  # =====================
  # Redis (production config)
  # =====================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    networks:
      - brainstorm-net

  # =====================
  # FastAPI Backend (production)
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_FORMAT: ${APP_LOG_FORMAT:-json}
      DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${DOMAIN:-localhost}}
      UPLOAD_DIR: /app/uploads
      SHARE_BASE_URL: https://${DOMAIN:-localhost}
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health/ready').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - brainstorm-net

  # =====================
  # Celery Worker (production)
  # =====================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "
        celery -A app.tasks.celery_app worker
          --loglevel=info
          --pool=$${CELERY_POOL:-prefork}
          --concurrency=$${CELERY_CONCURRENCY:-4}
      "
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_POOL: ${CELERY_POOL:-prefork}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
      CELERY_TASK_SOFT_TIME_LIMIT: ${CELERY_TASK_SOFT_TIME_LIMIT:-180}
      CELERY_TASK_TIME_LIMIT: ${CELERY_TASK_TIME_LIMIT:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    networks:
      - brainstorm-net

  # =====================
  # Frontend (production — Nginx serves built assets)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "5173"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - brainstorm-net

  # =====================
  # Nginx Reverse Proxy
  # =====================
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"
    networks:
      - brainstorm-net

  # =====================
  # Database Backup (cron)
  # =====================
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      PGHOST: postgres
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backups-data:/backups
    depends_on:
      - postgres
    networks:
      - brainstorm-net

volumes:
  postgres-data:
  redis-data:
  uploads-data:
  backups-data:

networks:
  brainstorm-net:
    driver: bridge
